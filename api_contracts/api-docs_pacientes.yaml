openapi: 3.1.0
info:
  title: OpenAPI definition
  version: v2
servers:
- url: http://localhost:8081
  description: Generated server url
tags:
- name: Pacientes
  description: Operaciones de gestión de pacientes
paths:
  /api/pacientes/{id}:
    get:
      tags:
      - Pacientes
      summary: Obtener un paciente por su ID
      operationId: obtenerPorId
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Paciente"
    put:
      tags:
      - Pacientes
      summary: Actualizar los datos de un paciente existente
      operationId: actualizar
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PacienteDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Paciente"
    delete:
      tags:
      - Pacientes
      summary: Eliminar un paciente por su ID
      operationId: eliminar
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int64
      responses:
        "200":
          description: OK
  /api/pacientes:
    get:
      tags:
      - Pacientes
      summary: Listar todos los pacientes registrados
      operationId: listarTodos
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Paciente"
    post:
      tags:
      - Pacientes
      summary: Registrar un nuevo paciente
      operationId: registrar
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PacienteDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/Paciente"
components:
  schemas:
    PacienteDto:
      type: object
      properties:
        nombre:
          type: string
        apellido:
          type: string
        fechaNacimiento:
          type: string
          format: date
        telefono:
          type: string
        correoElectronico:
          type: string
        numeroCedula:
          type: string
        grupoSanguineo:
          type: string
    Paciente:
      type: object
      properties:
        id:
          type: integer
          format: int64
        nombre:
          type: string
        apellido:
          type: string
        fechaNacimiento:
          type: string
          format: date
        telefono:
          type: string
        correoElectronico:
          type: string
        numeroCedula:
          type: string
        grupoSanguineo:
          type: string
