# ─── Aplicación ───────────────────────────────────────────────────────────────
spring.application.name=servicio-gateway
server.port=9090

# ─── Eureka (Servidor de Descubrimiento) ──────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# ─── OAuth2 Resource Server (Keycloak) ────────────────────────────────────────
# El gateway obtiene la clave pública de Keycloak automáticamente desde esta URI
# para validar los tokens JWT sin necesidad de llamadas adicionales por request.
# KEYCLOAK_URL se inyecta desde docker-compose (internamente Keycloak corre en puerto 8080)
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8180}/realms/citas-medicas

# ─── Spring Cloud Gateway ─────────────────────────────────────────────────────
# Habilita la integración con Eureka para resolución dinámica de servicios (lb://)
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# ─── Logging (útil para depurar rutas durante desarrollo) ─────────────────────
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty=INFO
