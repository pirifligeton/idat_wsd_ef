# ─── Aplicación ───────────────────────────────────────────────────────────────
spring.application.name=servicio-pacientes
server.port=8081

# ─── Base de datos PostgreSQL ─────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/citas_medicas
spring.datasource.username=admin
spring.datasource.password=admin123
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
# update: crea o actualiza la tabla automáticamente al iniciar
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── Eureka (Servidor de Descubrimiento) ──────────────────────────────────────
# Cuando el servicio de descubrimiento no está activo, este servicio igual levanta
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# ─── Swagger UI / OpenAPI ─────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
