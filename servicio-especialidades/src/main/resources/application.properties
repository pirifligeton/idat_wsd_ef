# ─── Aplicación ───────────────────────────────────────────────────────────────
spring.application.name=servicio-especialidades
server.port=8084

# ─── Base de datos PostgreSQL ─────────────────────────────────────────────────
# DB_HOST se inyecta desde docker-compose; el fallback localhost sirve para desarrollo local
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/especialidades_db
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ─── Eureka (Servidor de Descubrimiento) ──────────────────────────────────────
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true
eureka.instance.prefer-ip-address=true

# ─── URL de servicio-medicos (fallback si Eureka no está activo) ──────────────
servicios.medicos.url=${MEDICOS_URL:http://localhost:8082}

# ─── Swagger UI / OpenAPI ─────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tags-sorter=alpha
